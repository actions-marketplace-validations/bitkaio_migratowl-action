name: E2E Tests

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * *'   # nightly at 04:00 UTC

permissions:
  contents: read

jobs:
  e2e-python:
    name: E2E / Python
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: ./
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          scan-trigger: always
          results-destination: artifact
          ecosystems: python

  e2e-node:
    name: E2E / Node.js
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: ./
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          scan-trigger: always
          results-destination: artifact
          ecosystems: nodejs

  e2e-go:
    name: E2E / Go
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: ./
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          scan-trigger: always
          results-destination: artifact
          ecosystems: go

  e2e-rust:
    name: E2E / Rust
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: ./
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          scan-trigger: always
          results-destination: artifact
          ecosystems: rust

  e2e-java:
    name: E2E / Java
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: ./
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          scan-trigger: always
          results-destination: artifact
          ecosystems: java

  e2e-dependabot-sim:
    name: E2E / Dependabot PR simulation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: ./
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          scan-trigger: always
          results-destination: artifact
          check-deps: requests
          ecosystems: python

  e2e-arm64:
    name: E2E / arm64 smoke test
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: ./
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          scan-trigger: always
          results-destination: artifact
          ecosystems: python

  upload-results:
    name: Upload scan results
    runs-on: ubuntu-latest
    needs: [e2e-python, e2e-node, e2e-go, e2e-rust, e2e-java, e2e-dependabot-sim, e2e-arm64]
    if: always()
    permissions:
      contents: read
    steps:
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: e2e-scan-results
          path: migratowl-scan-result.json
          if-no-files-found: ignore
          retention-days: 14
